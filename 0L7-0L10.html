<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國語五下 L7–L10 複習系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef6ff;--card:#fff;--text:#1a2a3e;--light:#556677;--border:#d0dff0;
  --p:#3a7bd5;--pl:#ddeeff;--danger:#ff4f6e;--ok:#22c55e;--warn:#f59e0b;
  --l7:#3a7bd5;--l8:#22a699;--l9:#e04a6a;--l10:#8b5cf6;
  --font:'Noto Sans TC','Microsoft JhengHei',sans-serif;
}
[data-theme=dark]{
  --bg:#0f1420;--card:#1a2030;--text:#e0e8f8;--light:#8899bb;--border:#2a3a55;
  --p:#5b9ef5;--pl:#1a2d50;--danger:#ff6b85;--ok:#4ade80;--warn:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
button{font-family:var(--font);cursor:pointer;}
:focus-visible{outline:3px solid var(--p);outline-offset:2px;}

/* ── shell ── */
#app{max-width:1000px;margin:0 auto;padding:16px 14px 60px;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:linear-gradient(135deg,#2563eb 0%,#0891b2 100%);
  color:#fff;border-radius:20px;padding:16px 22px;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(37,99,235,.30);
}
.topbar-left{display:flex;align-items:center;gap:14px;}
.topbar-icon{font-size:2.2rem;line-height:1;}
.topbar h1{font-size:1.15rem;font-weight:900;margin-bottom:2px;}
.topbar p{font-size:.78rem;opacity:.85;}
.theme-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:38px;height:38px;font-size:1.1rem;color:#fff;flex:none;}

/* ── tabs ── */
.tabs-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.tab-btn{
  border:2px solid var(--border);background:var(--card);color:var(--light);
  border-radius:50px;padding:8px 18px;font-size:.88rem;font-weight:700;
  transition:all .2s;
}
.tab-btn:hover{border-color:var(--p);color:var(--p);}
.tab-btn.active{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 4px 12px rgba(58,123,213,.35);}

.view{display:none;}
.view.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── lesson pills ── */
.lesson-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.lpill{border:2px solid var(--border);background:var(--card);color:var(--light);border-radius:50px;padding:6px 16px;font-size:.83rem;font-weight:700;transition:all .2s;}
.lpill.a-l7,.lpill.a-l7:hover{background:var(--l7);border-color:var(--l7);color:#fff;}
.lpill.a-l8,.lpill.a-l8:hover{background:var(--l8);border-color:var(--l8);color:#fff;}
.lpill.a-l9,.lpill.a-l9:hover{background:var(--l9);border-color:var(--l9);color:#fff;}
.lpill.a-l10,.lpill.a-l10:hover{background:var(--l10);border-color:var(--l10);color:#fff;}

/* ── card ── */
.card{background:var(--card);border-radius:18px;border:1.5px solid var(--border);padding:22px 24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.card-title{font-size:1.1rem;font-weight:900;margin-bottom:14px;}
.muted{color:var(--light);font-size:.85rem;}
.section-label{font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--light);margin:18px 0 8px;}

/* ── summary card ── */
.summary-box{background:var(--pl);border-radius:14px;padding:14px 18px;margin-bottom:18px;line-height:1.85;font-size:.93rem;}

/* ── vocab grid ── */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px;}
.vcard{background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;}
.vchar{font-size:2rem;font-weight:900;line-height:1.2;margin-bottom:4px;}
.vpinyin{font-size:.82rem;font-weight:700;color:var(--p);margin-bottom:2px;}
.vword{font-size:.82rem;color:var(--light);margin-bottom:6px;}
.vmnemonic{font-size:.78rem;border-top:1px solid var(--border);padding-top:7px;margin-top:4px;line-height:1.6;}

/* ── fillin list ── */
.fillin-list{list-style:none;}
.fillin-list li{padding:9px 0;border-bottom:1px solid var(--border);font-size:.92rem;display:flex;gap:8px;align-items:baseline;}
.fillin-list li:last-child{border-bottom:none;}
.fq-num{font-weight:700;color:var(--p);min-width:22px;}
.fq-ans{font-weight:700;color:var(--ok);}

/* ── rhetoric ── */
.rhet-list{list-style:none;}
.rhet-list li{padding:9px 0;border-bottom:1px solid var(--border);font-size:.9rem;line-height:1.7;}
.rhet-list li:last-child{border-bottom:none;}
.rhet-ans{display:inline-block;background:var(--pl);color:var(--p);font-weight:700;border-radius:6px;padding:1px 10px;margin-left:8px;font-size:.82rem;}

/* ── idiom chips ── */
.idiom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:10px;}
.ichip{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;}
.ichip .iw{font-size:1.05rem;font-weight:700;margin-bottom:4px;}
.ichip .im{font-size:.78rem;color:var(--light);}
.ichip .ia{color:var(--p);font-weight:900;}

/* ── flip card ── */
.flip-area{display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;}
.flip-outer{width:260px;height:320px;perspective:1000px;cursor:pointer;user-select:none;}
.flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.flip-inner.flipped{transform:rotateY(180deg);}
.flip-face{position:absolute;inset:0;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.ff{background:var(--card);border:2px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.10);}
.fb{transform:rotateY(180deg);color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.18);}
.ff .hint{font-size:.8rem;color:var(--light);margin-top:14px;}
.ff .fc-pinyin{font-size:1.6rem;font-weight:900;color:var(--p);margin-bottom:6px;}
.ff .fc-word{font-size:.88rem;color:var(--light);}
.fb .fc-char{font-size:2.8rem;font-weight:900;margin-bottom:8px;}
.fb .fc-pinyin2{font-size:.88rem;opacity:.85;margin-bottom:4px;}
.fb .fc-word2{font-size:.82rem;opacity:.8;margin-bottom:10px;}
.fb .fc-mnemo{font-size:.78rem;opacity:.85;line-height:1.6;border-top:1px solid rgba(255,255,255,.3);padding-top:10px;margin-top:6px;}
.flip-counter{font-size:.83rem;color:var(--light);margin:10px 0;}
.flip-nav{display:flex;gap:12px;justify-content:center;margin:6px 0;}
.flip-nav button,.mastery-row button{border:2px solid var(--border);background:var(--card);color:var(--text);border-radius:12px;padding:10px 20px;font-weight:700;font-size:.88rem;transition:all .15s;}
.flip-nav button:hover{border-color:var(--p);color:var(--p);}
.mastery-row{display:flex;gap:10px;justify-content:center;margin-top:4px;}
.m-bad{border-color:var(--danger) !important;color:var(--danger) !important;}
.m-mid{border-color:var(--warn) !important;color:var(--warn) !important;}
.m-ok{border-color:var(--ok) !important;color:var(--ok) !important;}

/* ── quiz ── */
.quiz-setup{margin-bottom:16px;}
.filter-label{font-size:.8rem;font-weight:700;color:var(--light);margin:12px 0 6px;}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;}
.fpill{border:2px solid var(--border);background:var(--card);color:var(--light);border-radius:50px;padding:5px 14px;font-size:.82rem;font-weight:700;transition:all .2s;}
.fpill.sel{background:var(--p);border-color:var(--p);color:#fff;}
.start-btn{background:var(--p);color:#fff;border:none;border-radius:50px;padding:11px 28px;font-size:.95rem;font-weight:700;margin-top:14px;transition:opacity .2s;}
.start-btn:hover{opacity:.88;}
.qcard{background:var(--bg);border:1.5px solid var(--border);border-radius:16px;padding:20px 22px;margin:14px 0;}
.q-meta{font-size:.75rem;color:var(--light);font-weight:700;margin-bottom:6px;}
.q-prompt{font-size:1rem;font-weight:700;line-height:1.6;margin-bottom:16px;}
.opt-btn{display:block;width:100%;text-align:left;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:10px 16px;margin-bottom:8px;font-size:.92rem;transition:all .15s;}
.opt-btn:hover:not(:disabled){border-color:var(--p);color:var(--p);}
.opt-btn.correct{background:#dcfce7;border-color:var(--ok);color:#166534;}
.opt-btn.wrong{background:#ffe4e6;border-color:var(--danger);color:#9f1239;}
.text-row{display:flex;gap:8px;margin-bottom:10px;}
.text-row input{flex:1;font-family:var(--font);font-size:.95rem;padding:10px 14px;border:2px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);}
.text-row input:focus{outline:none;border-color:var(--p);}
.send-btn{background:var(--p);color:#fff;border:none;border-radius:12px;padding:10px 20px;font-weight:700;font-size:.9rem;}
.feedback{margin-top:10px;padding:10px 16px;border-radius:12px;font-weight:700;font-size:.9rem;}
.fb-ok{background:#dcfce7;color:#166534;}
.fb-no{background:#ffe4e6;color:#9f1239;}
.next-btn{background:var(--p);color:#fff;border:none;border-radius:50px;padding:10px 28px;font-weight:700;margin-top:12px;}
.score-bar{display:flex;justify-content:space-between;font-size:.82rem;color:var(--light);margin-bottom:10px;}
.result-card{text-align:center;padding:20px;}
.result-score{font-size:2.6rem;font-weight:900;color:var(--p);}
.result-label{font-size:.9rem;color:var(--light);margin-bottom:16px;}
.retry-btn{background:var(--danger);color:#fff;border:none;border-radius:50px;padding:10px 24px;font-weight:700;margin:4px;}
.back-btn{background:var(--card);color:var(--text);border:2px solid var(--border);border-radius:50px;padding:10px 24px;font-weight:700;margin:4px;}
.wrong-list{text-align:left;list-style:none;margin:14px 0;}
.wrong-list li{padding:8px 0;border-bottom:1px solid var(--border);font-size:.88rem;}
.wrong-list li:last-child{border-bottom:none;}

/* ── plan ── */
.day-block{border-left:5px solid var(--p);margin-bottom:18px;padding:14px 18px;background:var(--card);border-radius:0 16px 16px 0;border-top:1.5px solid var(--border);border-right:1.5px solid var(--border);border-bottom:1.5px solid var(--border);}
.day-title{font-size:1rem;font-weight:900;margin-bottom:10px;}
.task-item{display:flex;align-items:flex-start;gap:10px;margin:7px 0;font-size:.9rem;}
.task-item input[type=checkbox]{width:17px;height:17px;margin-top:3px;accent-color:var(--p);}
.task-item.done span{text-decoration:line-through;color:var(--light);}
.tip-box{background:var(--pl);border-radius:12px;padding:10px 14px;margin-top:12px;font-size:.83rem;line-height:1.65;}

/* ── bank ── */
.bank-controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.bank-btn{border:2px solid var(--border);background:var(--card);color:var(--text);border-radius:50px;padding:9px 20px;font-weight:700;font-size:.88rem;}
.bank-btn.primary{background:var(--p);border-color:var(--p);color:#fff;}
.bank-item{padding:12px 0;border-bottom:1px solid var(--border);}
.bank-item:last-child{border-bottom:none;}
.b-meta{font-size:.72rem;color:var(--light);font-weight:700;margin-bottom:4px;}
.b-prompt{font-weight:700;font-size:.92rem;margin-bottom:6px;}
.b-opts{font-size:.82rem;color:var(--light);margin-bottom:6px;}
.reveal-btn{border:1.5px solid var(--p);background:transparent;color:var(--p);border-radius:50px;padding:3px 14px;font-size:.78rem;font-weight:700;}
.b-answer{display:none;background:var(--pl);border-radius:10px;padding:8px 14px;margin-top:6px;font-size:.88rem;font-weight:700;color:var(--p);}
.b-answer.show{display:block;}

/* ── idiom training ── */
.idiom-card-wrap{display:flex;justify-content:center;padding:10px 0;}
.idiom-card{width:300px;min-height:280px;background:var(--card);border:2px solid var(--border);border-radius:20px;padding:24px;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.08);}
.ic-word{font-size:2rem;font-weight:900;margin-bottom:8px;}
.ic-blank{color:var(--p);border-bottom:3px solid var(--p);display:inline-block;min-width:28px;}
.ic-meaning{font-size:.88rem;color:var(--light);margin:10px 0;line-height:1.7;}
.ic-reveal{display:none;}
.ic-reveal.show{display:block;}
.ic-ans{font-size:1.5rem;font-weight:900;color:var(--ok);margin:8px 0;}
.idiom-nav{display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.idiom-nav button,.idiom-reveal-btn{border:2px solid var(--border);background:var(--card);color:var(--text);border-radius:12px;padding:9px 20px;font-weight:700;font-size:.88rem;}
.idiom-reveal-btn{background:var(--p);border-color:var(--p);color:#fff;}

@media(max-width:600px){
  .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
  .topbar h1{font-size:1rem;}
  .flip-outer{width:220px;height:280px;}
}
</style>
</head>
<body>
<div id="app">

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-icon">📚</div>
    <div>
      <h1>國語五下 L7–L10 複習系統</h1>
      <p>魔術師爸爸・八歲一個人去旅行・紅鼻子醫生・沉默的動物園</p>
    </div>
  </div>
  <button class="theme-btn" id="themeBtn" title="切換明暗">🌙</button>
</div>

<div class="tabs-wrap" id="mainTabs">
  <button class="tab-btn active" data-tab="notes">📖 課文筆記</button>
  <button class="tab-btn" data-tab="quiz">🎯 互動練習</button>
  <button class="tab-btn" data-tab="plan">📕 5天計畫</button>
  <button class="tab-btn" data-tab="bank">📗 100題題庫</button>
  <button class="tab-btn" data-tab="cards">📘 注音默寫</button>
  <button class="tab-btn" data-tab="idiom">🏆 成語特訓</button>
</div>

<section class="view active" id="view-notes"></section>
<section class="view" id="view-quiz"></section>
<section class="view" id="view-plan"></section>
<section class="view" id="view-bank"></section>
<section class="view" id="view-cards"></section>
<section class="view" id="view-idiom"></section>

</div><!-- #app -->

<script>
/* ==================== DATA ==================== */
const LESSONS = {
  L7: {
    key:'L7',no:'第7課',title:'魔術師爸爸',genre:'詩歌',author:'米雅',color:'#3a7bd5',
    cover:'🎩',
    summary:'這是一首詩。主角的爸爸離開後，主角發現爸爸像魔術師一樣，在春天變成小花，夏天變成大樹，秋天變成葉子，冬天變成煙，即使暫時找不到爸爸，主角仍相信爸爸會變成溫熱的親吻，留在自己臉上。全文透過「爸爸變成自然景物」這件事，表達主角對爸爸的思念，主旨是：思念不會因時間而變淡，就像爸爸用四季不同的形式，持續陪伴著主角。',
    rhetoricOptions:{A:'譬喻',B:'類疊',C:'摹寫',D:'設問'},
    vocab:[
      {n:1,char:'徑',pinyin:'ㄐㄧㄥˋ',word:'小徑、捷徑',mnemonic:'彳（走路）＋巠（一條直線）→走的窄路＝小徑／捷徑'},
      {n:2,char:'渾',pinyin:'ㄏㄨㄣˊ',word:'渾濁、渾身',mnemonic:'氵（水）＋軍（混在一起）→水混濁不清＝渾濁'},
      {n:3,char:'痱',pinyin:'ㄈㄟˋ',word:'痱子',mnemonic:'疒（生病）＋非（許多小點）→皮膚長很多小紅點＝痱子'},
      {n:4,char:'癢',pinyin:'ㄧㄤˇ',word:'發癢、不痛不癢',mnemonic:'疒（病）＋羊（像被羊毛刺到）→皮膚刺刺的感覺＝癢'},
      {n:5,char:'魁',pinyin:'ㄎㄨㄟˊ',word:'魁梧、罪魁禍首',mnemonic:'鬼＋斗（大容器）→像鬼怪一樣高大＝魁梧'},
      {n:6,char:'梧',pinyin:'ㄨˊ',word:'魁梧、梧桐',mnemonic:'木＋吾（我）→高大的梧桐樹，常與「魁」連用＝魁梧'},
      {n:7,char:'眠',pinyin:'ㄇㄧㄢˊ',word:'睡眠、不眠不休',mnemonic:'目＋民（躺平的人）→閉上眼睛躺著＝睡眠'},
      {n:8,char:'枚',pinyin:'ㄇㄟˊ',word:'一枚石子',mnemonic:'木＋攴（輕輕拿著）→古人拿小木棒當計算單位＝一枚'},
      {n:9,char:'絢',pinyin:'ㄒㄩㄢˋ',word:'絢麗',mnemonic:'糹（絲線）＋旬（十天，引申多彩）→色彩繽紛的絲線＝絢麗'},
      {n:10,char:'湊',pinyin:'ㄘㄡˋ',word:'湊近、湊過來',mnemonic:'氵＋奏（聚在一起演奏）→水流聚集、靠近＝湊近'},
      {n:11,char:'任',pinyin:'ㄖㄣˋ',word:'任何、責任',mnemonic:'亻＋壬（挑著重擔的人）→人挑起責任＝任何／責任'},
      {n:12,char:'何',pinyin:'ㄏㄜˊ',word:'任何、何時',mnemonic:'亻＋可（開口發問）→人開口問「可」＝任何／何時'},
      {n:13,char:'概',pinyin:'ㄍㄞˋ',word:'大概、概算',mnemonic:'木＋既（已經刮平）→用木棍刮平穀物，引申大略估計＝大概'},
      {n:14,char:'爾',pinyin:'ㄦˇ',word:'出爾反爾',mnemonic:'古字的「你」→出爾反爾（你自己說的話又自己推翻）'},
    ],
    fillin:[
      {n:1,q:'本課的文體是屬於①。',a:'詩歌'},
      {n:2,q:'本課的作者是②。',a:'米雅'},
      {n:3,q:'爸爸離開後，主角發現爸爸春天時變成③。',a:'小花'},
      {n:4,q:'爸爸離開後，主角發現爸爸夏天時變成④。',a:'大樹'},
      {n:5,q:'爸爸離開後，主角發現爸爸秋天時變成⑤。',a:'葉子'},
      {n:6,q:'爸爸離開後，主角發現爸爸冬天時變成⑥。',a:'煙'},
      {n:7,q:'即使暫時找不到爸爸，主角仍相信爸爸會變成⑦溫熱的親吻她的臉。',a:'眼淚'},
      {n:8,q:'本文透過爸爸變成的自然景物，表達主角對⑧的思念。',a:'爸爸'},
      {n:9,q:'全文的主旨是：思念不會隨著⑨而淡化。',a:'時間'},
      {n:10,q:'就像爸爸在四季以不同的⑩形式，持續陪伴主角。',a:'景物'},
    ],
    idioms:[
      {n:1,prompt:'終南捷□',answer:'徑',meaning:'比喻達到目的最便捷的途徑'},
      {n:2,prompt:'□□噩噩',answer:'渾',meaning:'渾渾噩噩：形容人糊塗、無所事事的樣子'},

/* ── derived pools ── */
function buildPool(){
  const pool=[];
  Object.values(LESSONS).forEach(L=>{
    L.idioms.forEach(it=>pool.push({id:`${L.key}-idiom-${it.n}`,lesson:L.key,lessonTitle:L.title,category:'成語',type:'text',prompt:`完成成語：${it.prompt}（提示：${it.meaning}）`,answer:it.answer}));
    L.rhetoric.forEach(it=>pool.push({id:`${L.key}-rhet-${it.n}`,lesson:L.key,lessonTitle:L.title,category:'修辭',type:'mc',prompt:it.sentence,options:L.rhetoricOptions,answer:it.answer}));
    L.choice.forEach(it=>pool.push({id:`${L.key}-mc-${it.n}`,lesson:L.key,lessonTitle:L.title,category:'選擇',type:'mc',prompt:it.q,options:it.options,answer:it.answer}));
    L.fillin.filter(it=>it.a).forEach(it=>pool.push({id:`${L.key}-fill-${it.n}`,lesson:L.key,lessonTitle:L.title,category:'填充',type:'text',prompt:it.q,answer:it.a}));
    L.vocab.filter(v=>!v.char.includes('對照')).forEach(it=>pool.push({id:`${L.key}-zhu-${it.n}`,lesson:L.key,lessonTitle:L.title,category:'注音',type:'text',prompt:`看注音、想詞語，寫出國字：${it.pinyin}（詞語：${it.word.split('、')[0]}）`,answer:it.char}));
  });
  return pool;
}
function build100(){
  const out=[];let qn=0;
  function pick(L,idiomNs){
    L.choice.forEach(it=>out.push(makeQ(L,'選擇',it.q,it.options,it.answer)));
    L.rhetoric.forEach(it=>out.push(makeQ(L,'修辭',it.sentence,L.rhetoricOptions,it.answer)));
    idiomNs.forEach(n=>{const it=L.idioms.find(x=>x.n===n);if(it)out.push(makeQ(L,'成語',`完成成語：${it.prompt}`,null,it.answer,it.meaning));});
  }
  function makeQ(L,cat,prompt,options,answer,note){qn++;return{qno:qn,lesson:L.key,lessonTitle:L.title,category:cat,prompt,options,answer,note};}
  pick(LESSONS.L7,[1,3]);pick(LESSONS.L8,[4,9]);pick(LESSONS.L9,[6]);pick(LESSONS.L10,[1,4,6,8,10]);
  return out;
}

const BANK=build100();

/* ── utils ── */
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function norm(s){return String(s||'').trim().replace(/\s/g,'');}

function renderQuiz(){

    </div>
    <div id="qArea"></div>
  `;
  el.querySelectorAll('#qLessons .fpill').forEach(b=>b.addEventListener('click',()=>{
    b.classList.toggle('sel');
    b.classList.contains('sel')?sel.lessons.add(b.dataset.k):sel.lessons.delete(b.dataset.k);
  }));
  el.querySelectorAll('#qCats .fpill').forEach(b=>b.addEventListener('click',()=>{
    b.classList.toggle('sel');
    b.classList.contains('sel')?sel.cats.add(b.dataset.k):sel.cats.delete(b.dataset.k);
  }));
  el.querySelectorAll('#qCount .fpill').forEach(b=>b.addEventListener('click',()=>{
    el.querySelectorAll('#qCount .fpill').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');sel.count=Number(b.dataset.n);
  }));
  el.querySelector('#qStart').addEventListener('click',()=>{
    const filtered=POOL.filter(q=>sel.lessons.has(q.lesson)&&sel.cats.has(q.category));
    if(!filtered.length){document.getElementById('qArea').innerHTML=`<div class="card"><p class="muted">⚠️ 沒有符合條件的題目，請至少選一個課別與題型。</p></div>`;return;}
    quizState.pool=shuffle(filtered).slice(0,Math.min(sel.count,filtered.length));
    quizState.idx=0;quizState.score=0;quizState.wrong=[];
    renderQQuestion();
  });
}

function renderQQuestion(){
  const area=document.getElementById('qArea');
  if(quizState.idx>=quizState.pool.length){renderQSummary();return;}
  const q=quizState.pool[quizState.idx];
  const isMC=q.type==='mc'&&q.options;
  area.innerHTML=`
    <div class="card">
      <div class="score-bar"><span>第 ${quizState.idx+1} / ${quizState.pool.length} 題</span><span>✅ ${quizState.score}</span></div>
      <div class="qcard">
        <div class="q-meta">${LESSONS[q.lesson]?.no||q.lesson} ・ ${q.category}</div>
        <div class="q-prompt">${esc(q.prompt)}</div>
        ${isMC
          ?Object.entries(q.options).map(([l,t])=>`<button class="opt-btn" data-l="${l}">${l}. ${esc(t)}</button>`).join('')
          :`<div class="text-row"><input type="text" id="tInput" placeholder="輸入答案" autocomplete="off"><button class="send-btn" id="tSend">送出</button></div>`}
        <div id="qFeed"></div>
        <div id="qNext"></div>
      </div>
    </div>`;
  if(isMC){
    area.querySelectorAll('.opt-btn').forEach(btn=>btn.addEventListener('click',()=>{
      if(btn.disabled)return;
      area.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
      const ok=btn.dataset.l===q.answer;
      btn.classList.add(ok?'correct':'wrong');
      if(!ok){const cb=area.querySelector(`.opt-btn[data-l="${q.answer}"]`);if(cb)cb.classList.add('correct');}
      showFeedback(ok,q,btn.dataset.l);
    }));
  }else{
    const send=()=>{
      const inp=document.getElementById('tInput');
      if(inp.disabled)return;
      const given=inp.value;const ok=norm(given)===norm(q.answer);
      inp.disabled=true;document.getElementById('tSend').disabled=true;
      showFeedback(ok,q,given);
    };
    document.getElementById('tSend').addEventListener('click',send);
    document.getElementById('tInput').addEventListener('keydown',e=>{if(e.key==='Enter')send();});
  }
}
function showFeedback(ok,q,given){
  quizState.answered=(quizState.answered||0)+1;
  if(ok)quizState.score++;else quizState.wrong.push(q);
  const ansLabel=q.type==='mc'&&q.options?`${q.answer}. ${q.options[q.answer]}`:q.answer;
  document.getElementById('qFeed').innerHTML=ok
    ?`<div class="feedback fb-ok">✅ 答對了！</div>`
    :`<div class="feedback fb-no">❌ 正確答案：${esc(ansLabel)}</div>`;
  document.getElementById('qNext').innerHTML=`<button class="next-btn" id="nextQ">${quizState.idx+1<quizState.pool.length?'下一題 →':'查看結果 🏁'}</button>`;
  document.getElementById('nextQ').addEventListener('click',()=>{quizState.idx++;renderQQuestion();});
}
function renderQSummary(){
  const area=document.getElementById('qArea');
  const total=quizState.pool.length;
  const pct=total?Math.round(100*quizState.score/total):0;
  const emoji=pct>=90?'🏆':pct>=70?'⭐':'💪';
  area.innerHTML=`
    <div class="card result-card">
      <div class="result-score">${emoji} ${quizState.score}/${total}</div>
      <div class="result-label">${pct}% 答對率</div>
      ${quizState.wrong.length?`
        <details style="text-align:left;margin:14px 0;">
          <summary style="cursor:pointer;font-weight:700;color:var(--danger)">📌 答錯的 ${quizState.wrong.length} 題</summary>
          <ul class="wrong-list">${quizState.wrong.map(q=>`<li>[${q.category}] ${esc(q.prompt.slice(0,40))}… <b style="color:var(--ok)">→ ${esc(q.type==='mc'&&q.options?q.answer+'. '+q.options[q.answer]:q.answer)}</b></li>`).join('')}</ul>
        </details>
        <button class="retry-btn" id="retryWrong">只練錯題 🔁</button>
      `:'<p style="color:var(--ok);font-weight:700;margin:14px 0">🎉 全部答對！</p>'}
      <button class="back-btn" id="backSetup">回設定</button>
    </div>`;
  document.getElementById('backSetup')?.addEventListener('click',renderQuiz);
  document.getElementById('retryWrong')?.addEventListener('click',()=>{
    quizState.pool=shuffle(quizState.wrong);quizState.idx=0;quizState.score=0;quizState.wrong=[];renderQQuestion();
  });
}

}

/* ==================== CARDS ==================== */
function buildDeck(filter){
  let v=[];
  Object.values(LESSONS).forEach(L=>{
    if(filter!=='ALL'&&L.key!==filter)return;
    L.vocab.filter(x=>!x.char.includes('對照')).forEach(x=>v.push({...x,lkey:L.key,lcolor:L.color,ltitle:L.title,lno:L.no}));
  });
  return shuffle(v);
}
function renderCards(){
  const el=document.getElementById('view-cards');
  const lkeys=['ALL',...Object.keys(LESSONS)];
  el.innerHTML=`
    <div class="card">
      <div class="card-title">📘 注音默寫（字卡翻翻看）</div>
      <div class="lesson-pills" style="margin-bottom:14px">${lkeys.map(k=>`
        <button class="lpill${cardState.lesson===k?' a-'+(k==='ALL'?'l7':k.toLowerCase()):''}" data-ck="${k}"
          style="${cardState.lesson===k&&k!=='ALL'?`background:${LESSONS[k].color};border-color:${LESSONS[k].color};color:#fff`:''}">
          ${k==='ALL'?'全部':LESSONS[k].cover+' '+LESSONS[k].no}
        </button>`).join('')}
        <button class="lpill" id="shuffleCard">🔀 重新洗牌</button>
      </div>
      <div class="flip-area">
        <div class="flip-outer" id="flipOuter">
          <div class="flip-inner" id="flipInner">
            <div class="flip-face ff" id="flipFront"></div>
            <div class="flip-face fb" id="flipBack"></div>
          </div>
        </div>
        <div class="flip-counter" id="flipCtr"></div>
        <div class="mastery-row" id="masteryRow"></div>
      </div>
    </div>`;
  el.querySelectorAll('[data-ck]').forEach(b=>b.addEventListener('click',()=>{
    cardState.lesson=b.dataset.ck;cardState.deck=buildDeck(cardState.lesson);cardState.idx=0;renderCards();
  }));
  document.getElementById('shuffleCard').addEventListener('click',()=>{
    cardState.deck=shuffle(cardState.deck);cardState.idx=0;showCard2();
  });
  document.getElementById('flipOuter').addEventListener('click',()=>{
    document.getElementById('flipInner').classList.toggle('flipped');
  });
  if(!cardState.deck.length)cardState.deck=buildDeck(cardState.lesson);
  showCard2();
}
function showCard2(){
  if(cardState.idx>=cardState.deck.length)cardState.idx=0;
  const v=cardState.deck[cardState.idx];
  const inner=document.getElementById('flipInner');
  if(inner)inner.classList.remove('flipped');
  const front=document.getElementById('flipFront');
  const back=document.getElementById('flipBack');
  const ctr=document.getElementById('flipCtr');
  const mrow=document.getElementById('masteryRow');
  if(!v||!front)return;
  front.innerHTML=`
    <div class="muted" style="margin-bottom:8px">${v.lno}</div>
    <div class="fc-pinyin">${esc(v.pinyin)}</div>
    <div class="fc-word">${esc(v.word)}</div>
    <div class="hint">點卡片看國字 👆</div>`;
  back.style.background=v.lcolor;
  back.innerHTML=`
    <div class="fc-char">${esc(v.char)}</div>
    <div class="fc-pinyin2">${esc(v.pinyin)}</div>
    <div class="fc-word2">${esc(v.word)}</div>
    <div class="fc-mnemo">💡 ${esc(v.mnemonic)}</div>`;
  ctr.textContent=`第 ${cardState.idx+1} / ${cardState.deck.length} 張`;
  const lvl=mem.mastery[`${v.lkey}-v-${v.n}`]||'';
  mrow.innerHTML=`
    <button class="m-bad${lvl==='bad'?' sel':''}" data-lv="bad">❌ 不熟</button>
    <button class="m-mid${lvl==='mid'?' sel':''}" data-lv="mid">🤔 還可以</button>
    <button class="m-ok${lvl==='ok'?' sel':''}" data-lv="ok">✅ 熟悉</button>`;
  mrow.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    mem.mastery[`${v.lkey}-v-${v.n}`]=b.dataset.lv;
    cardState.idx++;showCard2();
  }));
}

/* ==================== IDIOM TRAINING ==================== */
function buildIdiomDeck(filter){
  let all=[];
  Object.values(LESSONS).forEach(L=>{
    if(filter!=='ALL'&&L.key!==filter)return;
    L.idioms.forEach(i=>all.push({...i,lkey:L.key,lcolor:L.color,lno:L.no,ltitle:L.title}));
  });
  return shuffle(all);
}
function renderIdiom(){
  const el=document.getElementById('view-idiom');
  const lkeys=['ALL',...Object.keys(LESSONS)];
  el.innerHTML=`
    <div class="card">
      <div class="card-title">🏆 成語特訓（共 ${Object.values(LESSONS).reduce((s,L)=>s+L.idioms.length,0)} 個）</div>
      <div class="lesson-pills" style="margin-bottom:14px">${lkeys.map(k=>`
        <button class="lpill${idiomState.lesson===k?' a-'+(k==='ALL'?'l7':k.toLowerCase()):''}" data-ik="${k}"
          style="${idiomState.lesson===k&&k!=='ALL'?`background:${LESSONS[k].color};border-color:${LESSONS[k].color};color:#fff`:''}">
          ${k==='ALL'?'全部':LESSONS[k].cover+' '+LESSONS[k].no}
        </button>`).join('')}
        <button class="lpill" id="idiomShuffle">🔀 重新洗牌</button>
      </div>
      <div class="idiom-card-wrap" id="idiomWrap"></div>
      <div class="flip-counter" id="idiomCtr" style="text-align:center;margin-top:8px;"></div>
      <div class="idiom-nav" id="idiomNav"></div>
    </div>
    <div class="card" style="margin-top:0">
      <div class="card-title" style="margin-bottom:12px">📋 全部成語一覽</div>
      ${Object.values(LESSONS).map(L=>`
        <div style="margin-bottom:16px">
          <div style="font-weight:700;color:${L.color};margin-bottom:8px">${L.cover} ${L.no}　${L.title}</div>
          <div class="idiom-grid">${L.idioms.map(i=>`
            <div class="ichip">
              <div class="iw">${i.prompt.replace(/□/g,`<span class="ia">${esc(i.answer)}</span>`)}</div>
              <div class="im">${esc(i.meaning)}</div>
            </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
  el.querySelectorAll('[data-ik]').forEach(b=>b.addEventListener('click',()=>{
    idiomState.lesson=b.dataset.ik;idiomState.all=buildIdiomDeck(idiomState.lesson);idiomState.idx=0;idiomState.revealed=false;renderIdiom();
  }));
  document.getElementById('idiomShuffle').addEventListener('click',()=>{
    idiomState.all=shuffle(idiomState.all);idiomState.idx=0;idiomState.revealed=false;showIdiomCard();
  });
  if(!idiomState.all.length)idiomState.all=buildIdiomDeck(idiomState.lesson);
  showIdiomCard();
}
function showIdiomCard(){
  const wrap=document.getElementById('idiomWrap');
  const ctr=document.getElementById('idiomCtr');
  const nav=document.getElementById('idiomNav');
  if(!wrap)return;
  if(idiomState.idx>=idiomState.all.length)idiomState.idx=0;
  const it=idiomState.all[idiomState.idx];
  if(!it){wrap.innerHTML='<p class="muted">沒有成語。</p>';return;}
  const promptHtml=it.prompt.replace(/□/g,`<span class="ic-blank">＿</span>`);
  ctr.textContent=`第 ${idiomState.idx+1} / ${idiomState.all.length} 個`;
  wrap.innerHTML=`
    <div class="idiom-card" style="border-color:${it.lcolor}">
      <div class="muted" style="margin-bottom:8px">${it.lno}</div>
      <div class="ic-word">${promptHtml}</div>
      <div class="ic-meaning">${esc(it.meaning)}</div>
      <div class="ic-reveal${idiomState.revealed?' show':''}">
        <div class="ic-ans" style="color:${it.lcolor}">答案：${esc(it.answer)}</div>
        <div style="font-size:.85rem;font-weight:700;margin-top:4px">
          ${it.prompt.replace(/□/g,`<span style="color:${it.lcolor};font-weight:900">${esc(it.answer)}</span>`)}
        </div>
      </div>
    </div>`;
  nav.innerHTML=`
    <button id="idiomReveal" class="idiom-reveal-btn">${idiomState.revealed?'已顯示':'顯示答案'}</button>
    <button id="idiomPrev" class="idiom-nav" style="border:2px solid var(--border);background:var(--card);border-radius:12px;padding:9px 20px;font-weight:700">← 上一個</button>
    <button id="idiomNext" class="idiom-nav" style="border:2px solid var(--border);background:var(--card);border-radius:12px;padding:9px 20px;font-weight:700">下一個 →</button>`;
  document.getElementById('idiomReveal').addEventListener('click',()=>{idiomState.revealed=true;showIdiomCard();});
  document.getElementById('idiomPrev').addEventListener('click',()=>{idiomState.idx=Math.max(0,idiomState.idx-1);idiomState.revealed=false;showIdiomCard();});
  document.getElementById('idiomNext').addEventListener('click',()=>{idiomState.idx++;idiomState.revealed=false;showIdiomCard();});
}

/* ── boot ── */
renderNotes();
</script>
</body>
