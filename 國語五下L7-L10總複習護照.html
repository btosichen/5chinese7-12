<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國語五下 ・ L7–L10 總複習護照</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3ECDA;
  --paper-dot:#E4D8B8;
  --card:#FFFCF4;
  --ink:#1F3D34;
  --ink-soft:#4B6359;
  --clay:#BC5B39;
  --clay-soft:#E7C3AE;
  --blue:#2B4B6F;
  --blue-soft:#CBD9E6;
  --gold:#B8902F;
  --gold-soft:#EEDFAF;
  --good:#3F7D5C;
  --bad:#B8453A;
  --serif:'Noto Serif TC', serif;
  --sans:'Noto Sans TC', sans-serif;
  --hand:'Caveat', cursive;
  --radius:14px;
  --shadow: 0 2px 0 rgba(31,61,52,.06), 0 8px 24px rgba(31,61,52,.10);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--sans);
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    radial-gradient(circle, var(--paper-dot) 1px, transparent 1.4px);
  background-size:22px 22px;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--serif); margin:0 0 .4em 0; line-height:1.3;}
p{line-height:1.85; margin:.4em 0;}
button{font-family:var(--sans); cursor:pointer;}
:focus-visible{outline:3px solid var(--blue); outline-offset:2px;}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
}

/* ---------- layout shell ---------- */
#app{max-width:980px; margin:0 auto; padding:18px 16px 60px;}
.topbar{
  display:flex; align-items:center; gap:14px;
  background:var(--ink); color:var(--paper);
  border-radius:var(--radius);
  padding:14px 20px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
}
.topbar .stamp-mini{width:46px;height:46px;flex:none;}
.topbar-text h1{font-size:1.15rem; color:var(--paper); margin:0;}
.topbar-text div{font-size:.78rem; color:var(--gold-soft); font-family:var(--hand); font-size:1rem;}

nav.tabs{
  display:flex; flex-wrap:wrap; gap:8px;
  margin-bottom:18px;
}
nav.tabs button{
  border:2px solid var(--ink);
  background:var(--card);
  color:var(--ink);
  border-radius:999px;
  padding:8px 16px;
  font-size:.92rem;
  font-weight:700;
  transition:transform .15s ease, background .15s ease;
}
nav.tabs button:hover{transform:translateY(-2px);}
nav.tabs button.active{background:var(--ink); color:var(--paper);}

.view{display:none;}
.view.active{display:block; animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px 22px;
  margin-bottom:16px;
}
.card h2{font-size:1.3rem; color:var(--ink); border-bottom:3px dotted var(--gold-soft); padding-bottom:8px;}
.muted{color:var(--ink-soft); font-size:.88rem;}
.pillrow{display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 16px;}
.pill{
  border:2px solid var(--ink-soft); background:transparent; color:var(--ink);
  border-radius:999px; padding:6px 14px; font-size:.85rem; font-weight:700;
}
.pill.active{background:var(--clay); border-color:var(--clay); color:#fff;}

/* ---------- home / passport map ---------- */
.route-wrap{position:relative; padding:30px 6px 10px;}
.route-line{
  position:absolute; top:78px; left:8%; right:8%; height:0;
  border-top:3px dashed var(--gold);
  z-index:0;
}
.stops{display:flex; justify-content:space-between; position:relative; z-index:1; flex-wrap:wrap; gap:18px;}
.stop{flex:1 1 140px; text-align:center; cursor:pointer; border:none; background:none;}
.stop .stamp{width:96px;height:96px;margin:0 auto 8px;}
.stop .stop-label{font-weight:700; font-size:.95rem;}
.stop .stop-sub{font-size:.78rem; color:var(--ink-soft);}
.stop .progress-chip{
  display:inline-block; margin-top:6px; font-size:.74rem; font-weight:700;
  background:var(--paper); border:2px solid var(--gold); border-radius:999px; padding:2px 10px; color:var(--ink);
}

.statsgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-top:18px;}
.statbox{background:var(--paper); border:2px solid var(--ink); border-radius:12px; padding:12px 14px; text-align:center;}
.statbox .num{font-family:var(--serif); font-size:1.7rem; color:var(--clay); font-weight:900;}
.statbox .lab{font-size:.78rem; color:var(--ink-soft);}

/* ---------- notes view ---------- */
.vocab-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin:14px 0;}
.vcard{
  border:2px solid var(--ink); border-radius:12px; background:var(--paper); padding:12px 14px;
  position:relative;
}
.vcard .vchar{font-family:var(--serif); font-size:1.8rem; font-weight:900; color:var(--ink);}
.vcard .vpinyin{font-size:.82rem; color:var(--clay); font-weight:700;}
.vcard .vword{font-size:.85rem; margin:4px 0; color:var(--ink-soft);}
.vcard .vmnemonic{font-size:.78rem; color:var(--blue); border-top:1px dashed var(--blue-soft); padding-top:6px; margin-top:6px;}
.qa-list{list-style:none; padding:0; margin:0;}
.qa-list li{padding:8px 0; border-bottom:1px solid var(--gold-soft); font-size:.93rem;}
.qa-list li b{color:var(--clay);}
.idiom-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px;}
.idiom-chip{border:2px dashed var(--blue); border-radius:10px; padding:8px 10px; font-size:.85rem; background:var(--blue-soft);}
.idiom-chip .ians{font-weight:900; color:var(--blue); font-family:var(--serif);}

/* ---------- quiz engine ---------- */
.quiz-setup .pillrow{margin-bottom:6px;}
.qcard{border:2px solid var(--ink); border-radius:16px; padding:22px; background:var(--paper); margin-top:14px;}
.qcard .qmeta{font-size:.78rem; color:var(--ink-soft); margin-bottom:6px;}
.qcard .qprompt{font-size:1.08rem; font-weight:700; margin-bottom:14px;}
.opt-btn{
  display:block; width:100%; text-align:left; margin-bottom:8px;
  border:2px solid var(--ink); background:var(--card); border-radius:10px;
  padding:10px 14px; font-size:.95rem;
}
.opt-btn:hover{background:#fff;}
.opt-btn.correct{background:var(--good); color:#fff; border-color:var(--good);}
.opt-btn.wrong{background:var(--bad); color:#fff; border-color:var(--bad);}
.text-answer-row{display:flex; gap:8px; margin-bottom:10px;}
.text-answer-row input{flex:1; font-size:1rem; padding:10px 12px; border:2px solid var(--ink); border-radius:10px; font-family:var(--sans);}
.btn{
  border:2px solid var(--ink); background:var(--ink); color:var(--paper);
  border-radius:999px; padding:9px 20px; font-weight:700; font-size:.92rem;
}
.btn.secondary{background:var(--card); color:var(--ink);}
.btn.clay{background:var(--clay); border-color:var(--clay); color:#fff;}
.feedback{margin-top:10px; padding:10px 14px; border-radius:10px; font-weight:700;}
.feedback.ok{background:var(--good); color:#fff;}
.feedback.no{background:var(--bad); color:#fff;}
.scorebar{display:flex; justify-content:space-between; align-items:center; font-size:.85rem; color:var(--ink-soft); margin-bottom:10px;}

/* ---------- 100 bank ---------- */
.bank-item{border-bottom:1px solid var(--gold-soft); padding:12px 0;}
.bank-item .bmeta{font-size:.72rem; color:var(--ink-soft); font-weight:700;}
.bank-item .bprompt{font-weight:700; margin:4px 0;}
.bank-item .banswer{display:none; background:var(--blue-soft); border-radius:8px; padding:8px 12px; margin-top:6px; font-size:.9rem;}
.bank-item .banswer.show{display:block;}
.reveal-btn{font-size:.8rem; border:1.5px solid var(--blue); color:var(--blue); background:transparent; border-radius:999px; padding:4px 12px;}

/* ---------- plan view ---------- */
.day-card{border-left:6px solid var(--clay); margin-bottom:14px; padding-left:16px;}
.day-card h3{font-size:1.1rem;}
.day-card .tip{background:var(--gold-soft); border-radius:10px; padding:8px 12px; font-size:.85rem; margin-top:8px;}
.task{display:flex; align-items:flex-start; gap:8px; margin:6px 0; font-size:.93rem;}
.task input{margin-top:4px; width:18px; height:18px;}
.task.done span{text-decoration:line-through; color:var(--ink-soft);}

/* ---------- flashcards ---------- */
.deck-controls{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px;}
.flip-area{display:flex; justify-content:center; margin:18px 0;}
.flipcard{
  width:280px; height:340px; perspective:1200px; cursor:pointer;
}
.flipcard-inner{
  width:100%; height:100%; position:relative; transition:transform .5s;
  transform-style:preserve-3d;
}
.flipcard.flipped .flipcard-inner{transform:rotateY(180deg);}
.flip-face{
  position:absolute; inset:0; border-radius:16px; border:3px solid var(--ink);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:18px; text-align:center; backface-visibility:hidden; box-shadow:var(--shadow);
}
.flip-front{background:var(--card);}
.flip-back{background:var(--ink); color:var(--paper); transform:rotateY(180deg);}
.flip-front .fchar{font-family:var(--serif); font-size:2.4rem; font-weight:900;}
.flip-back .bchar{font-family:var(--serif); font-size:2.6rem; font-weight:900; color:var(--gold-soft);}
.flip-back .bpinyin{color:var(--clay-soft); font-weight:700; margin:4px 0;}
.flip-back .bmnemo{font-size:.82rem; margin-top:8px; line-height:1.6;}
.deckcount{font-size:.85rem; color:var(--ink-soft); text-align:center; margin-top:4px;}
.mastery-row{display:flex; gap:10px; justify-content:center; margin-top:16px;}
.mbtn{border-radius:12px; border:2px solid var(--ink); padding:10px 16px; font-weight:700; background:var(--card);}
.mbtn.lvl-bad{border-color:var(--bad);}
.mbtn.lvl-mid{border-color:var(--gold);}
.mbtn.lvl-good{border-color:var(--good);}

footer.note{font-size:.78rem; color:var(--ink-soft); text-align:center; margin-top:30px;}

@media (max-width:640px){
  .route-line{display:none;}
  .stops{flex-direction:column;}
  .topbar-text h1{font-size:1rem;}
}
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <svg class="stamp-mini" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#B8902F" stroke-width="3" stroke-dasharray="4 3"/><text x="50" y="58" font-size="34" text-anchor="middle">🧭</text></svg>
    <div class="topbar-text">
      <h1>國語五下總複習護照</h1>

    </div>
  </div>

  <nav class="tabs" id="mainTabs">
    <button data-view="home" class="active">🗺️ 學習地圖</button>
    <button data-view="notes">📖 重點筆記</button>

  </nav>

  <section class="view active" id="view-home"></section>
  <section class="view" id="view-notes"></section>
  <section class="view" id="view-quiz"></section>
  <section class="view" id="view-plan"></section>
  <section class="view" id="view-bank"></section>
  <section class="view" id="view-cards"></section>

  <footer class="note">用愛與耐心做的複習小工具・祝考試順利 📮</footer>
</div>

<script>

// ===================== 衍生：題庫池（互動練習用） =====================
function buildPool(){
  const pool = [];
  Object.values(LESSONS).forEach(L=>{
    L.idioms.forEach(it=>pool.push({id:`${L.key}-idiom-${it.n}`, lesson:L.key, lessonTitle:L.title, category:'成語', type:'text', prompt:`完成成語：${it.prompt}（提示：${it.meaning}）`, answer:it.answer}));
    L.rhetoric.forEach(it=>pool.push({id:`${L.key}-rhet-${it.n}`, lesson:L.key, lessonTitle:L.title, category:'修辭', type:'mc', prompt:it.sentence, options:L.rhetoricOptions, answer:it.answer}));
    L.choice.forEach(it=>pool.push({id:`${L.key}-mc-${it.n}`, lesson:L.key, lessonTitle:L.title, category:'選擇', type:'mc', prompt:it.q, options:it.options, answer:it.answer}));
    L.fillin.filter(it=>it.a).forEach(it=>pool.push({id:`${L.key}-fill-${it.n}`, lesson:L.key, lessonTitle:L.title, category:'填充', type:'text', prompt:it.q, answer:it.a}));
    L.vocab.filter(v=>!v.char.includes('❓')).forEach(it=>pool.push({id:`${L.key}-zhu-${it.n}`, lesson:L.key, lessonTitle:L.title, category:'注音', type:'text', prompt:`看注音、想詞語，寫出國字：${it.pinyin}（詞語：${it.word.split('、')[0]}）`, answer:it.char}));
  });
  return pool;
}

// ===================== 100 題精選題庫（涵蓋四課，每課 25 題） =====================
function build100(){
  const out = [];
  let qn = 0;
  function pick(L, idiomNs){
    L.choice.forEach(it=>out.push(makeQ(L,'選擇',it.q,it.options,it.answer)));
    L.rhetoric.forEach(it=>out.push(makeQ(L,'修辭',it.sentence,L.rhetoricOptions,it.answer)));
    idiomNs.forEach(n=>{
      const it = L.idioms.find(x=>x.n===n);
      out.push(makeQ(L,'成語',`完成成語：${it.prompt}`,null,it.answer,it.meaning));
    });
  }
  function makeQ(L,cat,prompt,options,answer,note){
    qn++;
    return {qno:qn, lesson:L.key, lessonTitle:L.title, category:cat, prompt, options, answer, note};
  }
  pick(LESSONS.L7, [1,3]);
  pick(LESSONS.L8, [4,9]);
  pick(LESSONS.L9, [6]);
  pick(LESSONS.L10, [1,4,6,8,10]);
  return out;
}

/* ===================== storage helpers (works with or without window.storage) ===================== */
const memoryFallback = {};
async function storageGet(key){
  if (typeof window !== 'undefined' && window.storage){
    try{ const r = await window.storage.get(key, false); return r ? r.value : null; }
    catch(e){ return memoryFallback[key] !== undefined ? memoryFallback[key] : null; }
  }
  return memoryFallback[key] !== undefined ? memoryFallback[key] : null;
}
async function storageSet(key, value){
  memoryFallback[key] = value;
  if (typeof window !== 'undefined' && window.storage){
    try{ await window.storage.set(key, value, false); } catch(e){ /* ignore */ }
  }
}
async function loadJSON(key, fallback){
  const v = await storageGet(key);
  if (v === null || v === undefined) return fallback;
  try{ return JSON.parse(v); } catch(e){ return fallback; }
}
async function saveJSON(key, val){ await saveString(key, JSON.stringify(val)); }
async function saveString(key, str){ await storageSet(key, str); }

/* ===================== small utils ===================== */
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
let svgIdCounter = 0;
function stampSVG(emoji, label, color){
  svgIdCounter++;
  const id = 'stampPath' + svgIdCounter;
  return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs><path id="${id}" d="M 60,60 m -44,0 a 44,44 0 1,1 88,0 a 44,44 0 1,1 -88,0"/></defs>
    <circle cx="60" cy="60" r="52" fill="#FFFCF4" stroke="${color}" stroke-width="3" stroke-dasharray="3 4"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="${color}" stroke-width="1.4"/>
    <text font-family="Noto Sans TC, sans-serif" font-size="9" font-weight="700" fill="${color}" letter-spacing="1">
      <textPath xlink:href="#${id}" startOffset="3%">${escapeHtml(label)}</textPath>
    </text>
    <text x="60" y="70" font-size="32" text-anchor="middle">${emoji}</text>
  </svg>`;
}

/* ===================== mastery helpers ===================== */
async function computeMasteryAll(){
  const m = await loadJSON('cards:mastery', {});
  const out = {};
  Object.values(LESSONS).forEach(L => {
    const items = L.vocab.filter(v => !v.char.includes('❓'));
    if (items.length === 0){ out[L.key] = 0; return; }
    const goodCount = items.filter(v => m[`${L.key}-v-${v.n}`] === 'good').length;
    out[L.key] = Math.round(100 * goodCount / items.length);
  });
  return out;
}
async function computeOverallStats(){
  const m = await loadJSON('cards:mastery', {});
  let totalGood = 0, totalCards = 0;
  Object.values(LESSONS).forEach(L => {
    L.vocab.filter(v => !v.char.includes('❓')).forEach(v => {
      totalCards++;
      if (m[`${L.key}-v-${v.n}`] === 'good') totalGood++;
    });
  });
  const answered = await loadJSON('quiz:answered', 0);
  const planChecks = await loadJSON('plan:checks', {});
  const planDone = Object.values(planChecks).filter(Boolean).length;
  const bestScore = await loadJSON('bank:bestscore', null);
  return { totalGood, totalCards, answered, planDone, planTotal: 15, bestScore };
}

function quizCardMeta(q){ return `${LESSONS[q.lesson] ? LESSONS[q.lesson].no : q.lesson} ${q.lessonTitle || ''} ・ ${q.category}`; }

function renderQuizQuestion(){
  const area = document.getElementById('quizArea');
  if (quizState.idx >= quizState.pool.length){
    renderQuizSummary();
    return;
  }
  const q = quizState.pool[quizState.idx];
  let bodyHtml = '';
  if (q.type === 'mc' && q.options){
    bodyHtml = Object.entries(q.options).map(([letter, text]) =>
      `<button class="opt-btn" data-letter="${letter}">${letter}. ${escapeHtml(text)}</button>`
    ).join('');
  } else {
    bodyHtml = `
      <div class="text-answer-row">
        <input type="text" id="quizTextInput" placeholder="輸入答案" autocomplete="off">
        <button class="btn" id="quizCheckBtn">送出</button>
      </div>`;
  }
  area.innerHTML = `
    <div class="card">
      <div class="scorebar"><span>第 ${quizState.idx + 1} / ${quizState.pool.length} 題</span><span>目前分數：${quizState.score}</span></div>
      <div class="qcard">
        <div class="qmeta">${quizCardMeta(q)}</div>
        <div class="qprompt">${escapeHtml(q.prompt)}</div>
        ${bodyHtml}
        <div id="quizFeedback"></div>
        <div id="quizNextWrap" style="margin-top:12px;"></div>
      </div>
    </div>
  `;
  if (q.type === 'mc' && q.options){
    area.querySelectorAll('.opt-btn').forEach(btn => btn.addEventListener('click', () => answerMc(btn, q)));
  } else {
    const checkFn = () => answerText(q);
    document.getElementById('quizCheckBtn').addEventListener('click', checkFn);
    document.getElementById('quizTextInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkFn(); });
  }
}

function normalize(s){ return String(s || '').trim().replace(/[\s　]/g, ''); }

async function recordAnswered(){
  const cur = await loadJSON('quiz:answered', 0);
  await saveJSON('quiz:answered', cur + 1);
}

function answerMc(btn, q){
  if (btn.disabled) return;
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const correct = btn.dataset.letter === q.answer;
  btn.classList.add(correct ? 'correct' : 'wrong');
  if (!correct){
    const correctBtn = document.querySelector(`.opt-btn[data-letter="${q.answer}"]`);
    if (correctBtn) correctBtn.classList.add('correct');
  }
  finishAnswer(correct, q, btn.dataset.letter);
}

function answerText(q){
  const input = document.getElementById('quizTextInput');
  if (input.disabled) return;
  const given = input.value;
  const correct = normalize(given) === normalize(q.answer);
  input.disabled = true;
  document.getElementById('quizCheckBtn').disabled = true;
  finishAnswer(correct, q, given);
}

function finishAnswer(correct, q, given){
  quizState.answered++;
  recordAnswered();
  const fb = document.getElementById('quizFeedback');
  if (correct){
    quizState.score++;
    fb.innerHTML = `<div class="feedback ok">✅ 答對了！</div>`;
  } else {
    quizState.wrong.push(q);
    const answerLabel = q.type === 'mc' && q.options ? `${q.answer}. ${q.options[q.answer]}` : q.answer;
    fb.innerHTML = `<div class="feedback no">❌ 正確答案：${escapeHtml(answerLabel)}</div>`;
  }
  const nextWrap = document.getElementById('quizNextWrap');
  nextWrap.innerHTML = `<button class="btn" id="quizNextBtn">${quizState.idx + 1 < quizState.pool.length ? '下一題 ▶' : '查看結果 🏁'}</button>`;
  document.getElementById('quizNextBtn').addEventListener('click', () => {
    quizState.idx++;
    renderQuizQuestion();
  });
}

function renderQuizSummary(){
  const area = document.getElementById('quizArea');
  const total = quizState.pool.length;
  const pct = total ? Math.round(100 * quizState.score / total) : 0;
  if (quizState.mode === 'bank100' && total === 100){
    loadJSON('bank:bestscore', null).then(best => {
      if (best === null || quizState.score > best) saveJSON('bank:bestscore', quizState.score);
    });
  }
  area.innerHTML = `
    <div class="card">
      <h2>🏁 練習結果</h2>
      <p style="font-size:1.4rem;"><b>${quizState.score} / ${total}</b>　（${pct}%）</p>
      ${quizState.wrong.length ? `
        <h3>📌 答錯的題目</h3>
        <ul class="qa-list">${quizState.wrong.map(q => `<li>[${quizCardMeta(q)}] ${escapeHtml(q.prompt)} <b>→ ${escapeHtml(q.type === 'mc' && q.options ? q.answer + '.' + q.options[q.answer] : q.answer)}</b></li>`).join('')}</ul>
        <button class="btn clay" id="retryWrongBtn">只練習這些錯題 🔁</button>
      ` : `<p>🎉 全部答對，太棒了！</p>`}
      <button class="btn secondary" id="backToSetupBtn">回到設定畫面</button>
    </div>
  `;
  const retryBtn = document.getElementById('retryWrongBtn');
  if (retryBtn) retryBtn.addEventListener('click', () => {
    quizState.pool = shuffle(quizState.wrong);
    quizState.idx = 0; quizState.score = 0; quizState.wrong = [];
    renderQuizQuestion();
  });
  document.getElementById('backToSetupBtn').addEventListener('click', renderQuiz);
}

function renderPlan(){
  const el = document.getElementById('view-plan');
  el.innerHTML = `<div class="card"><h2>📕 段考前5天背誦計畫</h2><p class="muted">每天三個任務，做完就打勾。任務內容會連結到上面的其他功能。</p><div id="planDays"></div></div>`;
  loadJSON('plan:checks', {}).then(checks => {
    const wrap = document.getElementById('planDays');
    wrap.innerHTML = PLAN_DAYS.map(d => `
      <div class="day-card">
        <h3>Day ${d.day}　${escapeHtml(d.title)}</h3>
        ${d.tasks.map((t, i) => {
          const id = `d${d.day}-t${i}`;
          const done = !!checks[id];
          return `<label class="task ${done ? 'done' : ''}"><input type="checkbox" data-id="${id}" ${done ? 'checked' : ''}><span>${escapeHtml(t)}</span></label>`;
        }).join('')}
        <div class="tip">🧠 記憶技巧：${escapeHtml(d.technique)}</div>
      </div>
    `).join('');
    wrap.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.addEventListener('change', async () => {
        const cks = await loadJSON('plan:checks', {});
        cks[cb.dataset.id] = cb.checked;
        await saveJSON('plan:checks', cks);
        cb.closest('.task').classList.toggle('done', cb.checked);
      });
    });
  });
}

/* ===================== FLASHCARDS ===================== */
const cardsState = { deck: [], idx: 0, flipped: false, lesson: 'ALL' };

function buildDeck(lessonFilter){
  let vocab = [];
  Object.values(LESSONS).forEach(L => {
    if (lessonFilter !== 'ALL' && L.key !== lessonFilter) return;
    L.vocab.filter(v => !v.char.includes('❓')).forEach(v => {
      vocab.push({ id: `${L.key}-v-${v.n}`, lesson: L.key, lessonTitle: L.title, ...v });
    });
  });
  return shuffle(vocab);
}

function renderCards(){
  const el = document.getElementById('view-cards');
  el.innerHTML = `
    <div class="card">
      <h2>📘 默寫卡牌</h2>
      <p class="muted">正面是注音與詞語，點卡片翻到背面看國字、拼音和記憶小技巧。看完選一個熟悉程度，就會出現下一張。</p>
      <div class="deck-controls">
        <div class="pillrow" id="cardLessonPills"></div>
        <button class="btn secondary" id="shuffleBtn">🔀 重新洗牌</button>
      </div>
      <div class="flip-area"><div class="flipcard" id="flipcard"><div class="flipcard-inner">
        <div class="flip-face flip-front" id="flipFront"></div>
        <div class="flip-face flip-back" id="flipBack"></div>
      </div></div></div>
      <div class="deckcount" id="deckCount"></div>
      <div class="mastery-row" id="masteryRow"></div>
    </div>
  `;
  const lessonKeys = ['ALL', ...Object.keys(LESSONS)];
  const lp = document.getElementById('cardLessonPills');
  lp.innerHTML = lessonKeys.map(k => `<button class="pill ${k === cardsState.lesson ? 'active' : ''}" data-k="${k}">${k === 'ALL' ? '全部四課' : LESSONS[k].no}</button>`).join('');
  lp.querySelectorAll('.pill').forEach(b => b.addEventListener('click', () => {
    cardsState.lesson = b.dataset.k;
    cardsState.deck = buildDeck(cardsState.lesson);
    cardsState.idx = 0; cardsState.flipped = false;
    renderCards();
  }));
  document.getElementById('shuffleBtn').addEventListener('click', () => {
    cardsState.deck = shuffle(cardsState.deck);
    cardsState.idx = 0; cardsState.flipped = false;
    showCard();
  });
  if (cardsState.deck.length === 0) cardsState.deck = buildDeck(cardsState.lesson);
  showCard();
}

function showCard(){
  if (cardsState.idx >= cardsState.deck.length){ cardsState.idx = 0; }
  const v = cardsState.deck[cardsState.idx];
  const front = document.getElementById('flipFront');
  const back = document.getElementById('flipBack');
  const fc = document.getElementById('flipcard');
  fc.classList.remove('flipped');
  cardsState.flipped = false;
  if (!v){
    front.innerHTML = `<p>這個範圍還沒有字卡。</p>`;
    back.innerHTML = '';
    document.getElementById('deckCount').textContent = '';
    document.getElementById('masteryRow').innerHTML = '';
    return;
  }
  front.innerHTML = `<div class="muted">${LESSONS[v.lesson].no} ${v.lessonTitle}</div><div class="fchar">${escapeHtml(v.pinyin)}</div><div class="vword">${escapeHtml(v.word)}</div><div class="muted" style="margin-top:14px;">點卡片看國字 👆</div>`;
  back.innerHTML = `<div class="bchar">${escapeHtml(v.char)}</div><div class="bpinyin">${escapeHtml(v.pinyin)}</div><div class="vword" style="color:#F3ECDA;">${escapeHtml(v.word)}</div><div class="bmnemo">💡 ${escapeHtml(v.mnemonic)}</div>`;
  document.getElementById('deckCount').textContent = `第 ${cardsState.idx + 1} / ${cardsState.deck.length} 張`;
  fc.onclick = () => { fc.classList.toggle('flipped'); cardsState.flipped = !cardsState.flipped; };
  const mrow = document.getElementById('masteryRow');
  mrow.innerHTML = `
    <button class="mbtn lvl-bad" data-lvl="bad">❌ 不熟</button>
    <button class="mbtn lvl-mid" data-lvl="mid">🤔 還可以</button>
    <button class="mbtn lvl-good" data-lvl="good">✅ 熟悉</button>
  `;
  mrow.querySelectorAll('.mbtn').forEach(b => b.addEventListener('click', async () => {
    const m = await loadJSON('cards:mastery', {});
    m[v.id] = b.dataset.lvl;
    await saveJSON('cards:mastery', m);
    cardsState.idx++;
    showCard();
  }));
}
